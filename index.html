<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1a0803;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2rem 1rem;font-family:'Segoe UI',system-ui,sans-serif;-webkit-user-select:none;user-select:none;}
  h1{font-size:2.5rem;font-weight:700;color:#ff9840;letter-spacing:-0.02em;}
  .subtitle{font-size:0.85rem;color:#c06030;margin-top:2px;}
  header{display:flex;align-items:flex-end;justify-content:space-between;width:100%;max-width:420px;margin-bottom:1rem;}
  .scores{display:flex;gap:10px;}
  .score-box{background:#3c0f05;border:1px solid #6a2010;border-radius:6px;padding:8px 16px;text-align:center;min-width:80px;}
  .score-box .label{font-size:10px;color:#c06030;text-transform:uppercase;letter-spacing:0.08em;}
  .score-box .val{font-size:20px;font-weight:700;color:#ffb870;}
  .controls{display:flex;gap:8px;justify-content:flex-start;width:100%;max-width:420px;margin-bottom:0.8rem;}
  button{background:#5c1a00;color:#ffd0a0;border:1px solid #8a2800;border-radius:6px;padding:9px 22px;font-size:14px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s;}
  button:hover:not(:disabled){background:#7a2800;}
  button:disabled{background:#2a0800;color:#6a3020;border-color:#3a1408;cursor:default;}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px;background:#2d0f05;border-radius:10px;width:420px;max-width:100%;}
  .tile{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-weight:700;transition:background-color 0.07s;}
  .tile.new{animation:pop .14s ease-out;}
  @keyframes pop{from{transform:scale(0.4);opacity:0;}to{transform:scale(1);opacity:1;}}
  #congrats{display:none;width:100%;max-width:420px;margin-top:0.5rem;padding:18px 24px;border-radius:10px;border:1px solid #cc2200;background:#3c0500;text-align:center;}
  #congrats h2{font-size:1.5rem;color:#ffb870;margin-bottom:6px;}
  #congrats p{font-size:0.9rem;color:#ff9840;line-height:1.6;}
  .hint{font-size:12px;color:#6a2a10;text-align:center;margin-top:0.8rem;}
  @media(max-width:460px){.board{width:calc(100vw - 2rem);}h1{font-size:2rem;}}
</style>
</head>
<body>

<header>
  <div>
    <h1>2048</h1>
    <div class="subtitle">nekonečné undo</div>
  </div>
  <div class="scores">
    <div class="score-box"><div class="label">Skóre</div><div class="val" id="score">0</div></div>
    <div class="score-box"><div class="label">Nejlepší</div><div class="val" id="best">0</div></div>
  </div>
</header>

<div class="controls">
  <button id="undo-btn" onclick="undo()" disabled>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
    Zpět <span id="undo-count"></span>
  </button>
</div>

<div class="board" id="board"></div>

<div id="congrats">
  <h2>Gratulujeme! Hra dohrána.</h2>
  <p>Všech 16 políček obsahuje hodnoty 2&sup1; až 2&sup1;&sup6; (2 až 65&nbsp;536).<br>Dokonalé zaplnění celé hrací plochy!</p>
</div>

<div class="hint">Šipky / WASD &nbsp;&middot;&nbsp; Ctrl+Z = Zpět &nbsp;&middot;&nbsp; mobil: swipe</div>

<script>
const WIN_SET = new Set([2,4,8,16,32,64,128,256,512,1024,2048,4096,8192,16384,32768,65536]);

/* Paleta optimalizovaná pro červený filtr:
   kontrast zajišťuje pouze jas červeného kanálu –
   žádné modré ani zelené složky */
const COLORS = {
  0:     {bg:'rgba(255,160,80,0.10)', fg:'transparent'},
  2:     {bg:'#fff8f0', fg:'#5c1a00'},
  4:     {bg:'#ffe8d0', fg:'#5c1a00'},
  8:     {bg:'#ffd0a0', fg:'#4a1200'},
  16:    {bg:'#ffb870', fg:'#3a0e00'},
  32:    {bg:'#ff9840', fg:'#2a0800'},
  64:    {bg:'#ff7418', fg:'#fff8f0'},
  128:   {bg:'#f05000', fg:'#fff8f0'},
  256:   {bg:'#d83800', fg:'#fff8f0'},
  512:   {bg:'#be2800', fg:'#fff0e0'},
  1024:  {bg:'#a01c00', fg:'#ffe4c0'},
  2048:  {bg:'#841200', fg:'#ffd8a8'},
  4096:  {bg:'#680c00', fg:'#ffc880'},
  8192:  {bg:'#500800', fg:'#ffb860'},
  16384: {bg:'#3c0500', fg:'#ffa840'},
  32768: {bg:'#280300', fg:'#ff9820'},
  65536: {bg:'#180200', fg:'#ffcc00'},
};
function gc(v) { return COLORS[v] || {bg:'#100100', fg:'#ffaa00'}; }
function fs(v) { return v >= 10000 ? '1.05rem' : v >= 1000 ? '1.3rem' : v >= 100 ? '1.7rem' : '2.1rem'; }

let grid = Array(16).fill(0), score = 0, best = 0, history = [], newSet = new Set();

function isWon() {
  if (grid.some(v => v === 0)) return false;
  const s = new Set(grid);
  if (s.size !== 16) return false;
  for (const v of s) if (!WIN_SET.has(v)) return false;
  return true;
}
function canMove() {
  for (let i = 0; i < 16; i++) if (!grid[i]) return true;
  for (let r = 0; r < 4; r++) for (let c = 0; c < 3; c++) if (grid[r*4+c] === grid[r*4+c+1]) return true;
  for (let r = 0; r < 3; r++) for (let c = 0; c < 4; c++) if (grid[r*4+c] === grid[(r+1)*4+c]) return true;
  return false;
}
function rand() {
  const e = grid.reduce((a,v,i) => v===0 ? [...a,i] : a, []);
  if (!e.length) return;
  const i = e[Math.floor(Math.random() * e.length)];
  grid[i] = Math.random() < 0.9 ? 2 : 4;
  newSet.add(i);
}
function rot(g) {
  const n = Array(16);
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) n[c*4+(3-r)] = g[r*4+c];
  return n;
}
function slideL(g) {
  let moved = false, gained = 0, n = [...g];
  for (let r = 0; r < 4; r++) {
    let row = [];
    for (let c = 0; c < 4; c++) if (n[r*4+c]) row.push(n[r*4+c]);
    for (let i = 0; i < row.length-1; i++) if (row[i] === row[i+1]) { row[i] *= 2; gained += row[i]; row.splice(i+1,1); }
    while (row.length < 4) row.push(0);
    for (let c = 0; c < 4; c++) { if (n[r*4+c] !== row[c]) moved = true; n[r*4+c] = row[c]; }
  }
  return {grid:n, gained, moved};
}
function doMove(dir) {
  if (isWon()) return;
  if (!canMove()) return;
  let g = [...grid];
  const rc = {left:0, up:3, right:2, down:1}[dir];
  for (let i = 0; i < rc; i++) g = rot(g);
  const res = slideL(g);
  if (!res.moved) return;
  let ng = res.grid;
  for (let i = 0; i < (4-rc)%4; i++) ng = rot(ng);
  history.push({grid:[...grid], score});
  grid = ng; score += res.gained;
  if (score > best) best = score;
  newSet.clear();
  if (!isWon()) rand();
  render();
}
function undo() {
  if (!history.length) return;
  const p = history.pop();
  grid = p.grid; score = p.score; newSet.clear();
  render();
}
function render() {
  document.getElementById('score').textContent = score.toLocaleString('cs');
  document.getElementById('best').textContent = best.toLocaleString('cs');
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const v = grid[i];
    const {bg, fg} = gc(v);
    const d = document.createElement('div');
    d.className = 'tile' + (newSet.has(i) ? ' new' : '');
    d.style.background = bg; d.style.color = fg; d.style.fontSize = fs(v);
    if (v) d.textContent = v;
    board.appendChild(d);
  }
  document.getElementById('congrats').style.display = isWon() ? 'block' : 'none';
  const ub = document.getElementById('undo-btn');
  ub.disabled = !history.length;
  document.getElementById('undo-count').textContent = history.length ? `(${history.length})` : '';
}
document.addEventListener('keydown', e => {
  const m = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',KeyA:'left',KeyD:'right',KeyW:'up',KeyS:'down'};
  const d = m[e.code];
  if (d) { e.preventDefault(); doMove(d); }
  if (e.code === 'KeyZ' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
});
let tx = null, ty = null;
document.getElementById('board').addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.getElementById('board').addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 25) { tx = null; return; }
  doMove(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  tx = null;
});
rand(); rand(); render();
</script>
</body>
</html>
