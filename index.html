<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 – nekonečné undo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#ddd;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2rem 1rem;font-family:'Segoe UI',system-ui,sans-serif;-webkit-user-select:none;user-select:none;}
  h1{font-size:2.5rem;font-weight:700;color:#111;letter-spacing:-0.02em;}
  .subtitle{font-size:0.85rem;color:#666;margin-top:2px;}
  header{display:flex;align-items:flex-end;justify-content:space-between;width:100%;max-width:420px;margin-bottom:1rem;}
  .score-box{background:#222;border-radius:6px;padding:8px 16px;text-align:center;min-width:80px;}
  .score-box .label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.08em;}
  .score-box .val{font-size:20px;font-weight:700;color:#fff;}
  .controls{display:flex;gap:8px;justify-content:space-between;width:100%;max-width:420px;margin-bottom:0.8rem;}
  .controls-right{display:flex;gap:8px;}
  button{background:#222;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:14px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s;}
  button:hover:not(:disabled){background:#444;}
  button:disabled{background:#bbb;color:#888;cursor:default;}
  #status{font-size:12px;color:#555;text-align:center;width:100%;max-width:420px;min-height:1.4em;}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px;background:#333;border-radius:10px;width:420px;max-width:100%;touch-action:none;}
  .tile{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-weight:700;border:1px solid #aaa;}
  .tile.new{animation:pop .14s ease-out;}
  @keyframes pop{from{transform:scale(0.4);opacity:0;}to{transform:scale(1);opacity:1;}}
  #congrats{display:none;width:100%;max-width:420px;margin-top:0.5rem;padding:18px 24px;border-radius:10px;border:2px solid #000;background:#fff;text-align:center;}
  #congrats h2{font-size:1.5rem;color:#000;margin-bottom:6px;}
  #congrats p{font-size:0.9rem;color:#444;line-height:1.6;}
  .hint{font-size:12px;color:#888;text-align:center;margin-top:0.8rem;}
  @media(max-width:460px){.board{width:calc(100vw - 2rem);}h1{font-size:2rem;}}
</style>
</head>
<body>

<header>
  <div>
    <h1>2048</h1>
    <div class="subtitle">nekonečné undo</div>
  </div>
  <div class="score-box"><div class="label">Skóre</div><div class="val" id="score">0</div></div>
</header>

<div class="controls">
  <button id="undo-btn" onclick="undo()" disabled>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
    Zpět <span id="undo-count"></span>
  </button>
  <div class="controls-right">
    <button onclick="saveGame()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Uložit
    </button>
    <button onclick="loadGame()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Načíst
    </button>
  </div>
</div>

<div id="status"></div>

<div class="board" id="board"></div>

<div id="congrats">
  <h2>Gratulujeme! Hra dohrána.</h2>
  <p>Všech 16 políček obsahuje hodnoty 2&sup1; až 2&sup1;&sup6; (2 až 65&nbsp;536).<br>Dokonalé zaplnění celé hrací plochy!</p>
</div>

<div class="hint">Šipky / WASD &nbsp;&middot;&nbsp; Ctrl+Z = Zpět &nbsp;&middot;&nbsp; mobil: swipe</div>

<script>
// ── Vyplňte po registraci na jsonbin.io ──────────────────────────
const BIN_ID  = '69e69561856a6821895533cf';
const API_KEY = '$2a$10$2ODBVP1MUSuo2QfTE6A2ne4tbCs6fE5GNe1rvzW9ViyJxKbueb1ei';
// ─────────────────────────────────────────────────────────────────

const WIN_SET = new Set([2,4,8,16,32,64,128,256,512,1024,2048,4096,8192,16384,32768,65536]);

const P = {
  0:    {d:0, sp:0,  dark:false},
  2:    {d:0, sp:0,  dark:false},
  4:    {d:1, sp:28, dark:false},
  8:    {d:1, sp:14, dark:false},
  16:   {d:1, sp:10, dark:false},
  32:   {d:2, sp:16, dark:false},
  64:   {d:2, sp:11, dark:false},
  128:  {d:2, sp:8,  dark:false},
  256:  {d:2, sp:5,  dark:false},
  512:  {d:3, sp:8,  dark:false},
  1024: {d:3, sp:6,  dark:false},
  2048: {d:3, sp:4,  dark:true},
  4096: {d:3, sp:3,  dark:true},
  8192: {d:4, sp:6,  dark:true},
  16384:{d:4, sp:4,  dark:true},
  32768:{d:4, sp:3,  dark:true},
  65536:{d:4, sp:2,  dark:true},
};

const WHITE_SHADOW = '0 0 3px #fff, 0 0 5px #fff, 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff';
const BLACK_SHADOW = '0 0 3px #000, 0 0 5px #000';

function mkBg(d, sp) {
  if (d === 0) return '#fff';
  const L = a => `repeating-linear-gradient(${a}deg,#000 0,#000 1px,transparent 1px,transparent ${sp}px)`;
  const parts = [];
  if (d >= 1) parts.push(L(45));
  if (d >= 2) parts.push(L(-45));
  if (d >= 3) parts.push(L(0));
  if (d >= 4) parts.push(L(90));
  parts.push('#fff');
  return parts.join(',');
}

function fs(v) { return v >= 10000 ? '1.05rem' : v >= 1000 ? '1.3rem' : v >= 100 ? '1.7rem' : '2.1rem'; }

let grid = Array(16).fill(0), score = 0, history = [], newSet = new Set();

function setStatus(msg, ok = true) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = ok ? '#555' : '#c00';
  if (msg) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
}

async function saveGame() {
  if (BIN_ID === 'VASE_BIN_ID') { setStatus('Nejprve vyplňte BIN_ID a API_KEY v kódu.', false); return; }
  setStatus('Ukládám…');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ grid, score, history })
    });
    if (!res.ok) throw new Error(res.status);
    setStatus('Uloženo ✓');
  } catch (e) {
    setStatus('Chyba při ukládání: ' + e.message, false);
  }
}

async function loadGame() {
  if (BIN_ID === 'VASE_BIN_ID') { setStatus('Nejprve vyplňte BIN_ID a API_KEY v kódu.', false); return; }
  setStatus('Načítám…');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    grid    = data.record.grid;
    score   = data.record.score;
    history = data.record.history || [];
    newSet.clear();
    render();
    setStatus('Načteno ✓');
  } catch (e) {
    setStatus('Chyba při načítání: ' + e.message, false);
  }
}

function isWon() {
  if (grid.some(v => v === 0)) return false;
  const s = new Set(grid); if (s.size !== 16) return false;
  for (const v of s) if (!WIN_SET.has(v)) return false;
  return true;
}
function canMove() {
  for (let i = 0; i < 16; i++) if (!grid[i]) return true;
  for (let r = 0; r < 4; r++) for (let c = 0; c < 3; c++) if (grid[r*4+c] === grid[r*4+c+1]) return true;
  for (let r = 0; r < 3; r++) for (let c = 0; c < 4; c++) if (grid[r*4+c] === grid[(r+1)*4+c]) return true;
  return false;
}
function rand() {
  const e = grid.reduce((a,v,i) => v===0 ? [...a,i] : a, []);
  if (!e.length) return;
  const i = e[Math.floor(Math.random() * e.length)];
  grid[i] = Math.random() < 0.9 ? 2 : 4; newSet.add(i);
}
function rot(g) {
  const n = Array(16);
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) n[c*4+(3-r)] = g[r*4+c];
  return n;
}
function slideL(g) {
  let moved = false, gained = 0, n = [...g];
  for (let r = 0; r < 4; r++) {
    let row = [];
    for (let c = 0; c < 4; c++) if (n[r*4+c]) row.push(n[r*4+c]);
    for (let i = 0; i < row.length-1; i++) if (row[i] === row[i+1]) { row[i] *= 2; gained += row[i]; row.splice(i+1,1); }
    while (row.length < 4) row.push(0);
    for (let c = 0; c < 4; c++) { if (n[r*4+c] !== row[c]) moved = true; n[r*4+c] = row[c]; }
  }
  return {grid:n, gained, moved};
}
function doMove(dir) {
  if (isWon() || !canMove()) return;
  let g = [...grid];
  const rc = {left:0, up:3, right:2, down:1}[dir];
  for (let i = 0; i < rc; i++) g = rot(g);
  const res = slideL(g); if (!res.moved) return;
  let ng = res.grid;
  for (let i = 0; i < (4-rc)%4; i++) ng = rot(ng);
  history.push({grid:[...grid], score});
  grid = ng; score += res.gained;
  newSet.clear(); if (!isWon()) rand(); render();
}
function undo() {
  if (!history.length) return;
  const p = history.pop(); grid = p.grid; score = p.score; newSet.clear(); render();
}
function render() {
  document.getElementById('score').textContent = score.toLocaleString('cs');
  const board = document.getElementById('board'); board.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const v = grid[i], p = P[v] || {d:4, sp:2, dark:true};
    const el = document.createElement('div');
    el.className = 'tile' + (newSet.has(i) ? ' new' : '');
    el.style.background = v ? mkBg(p.d, p.sp) : '#ccc';
    el.style.color = p.dark ? '#fff' : '#000';
    el.style.textShadow = p.dark ? BLACK_SHADOW : WHITE_SHADOW;
    el.style.fontSize = fs(v);
    if (v) el.textContent = v;
    board.appendChild(el);
  }
  document.getElementById('congrats').style.display = isWon() ? 'block' : 'none';
  const ub = document.getElementById('undo-btn');
  ub.disabled = !history.length;
  document.getElementById('undo-count').textContent = history.length ? `(${history.length})` : '';
}
document.addEventListener('keydown', e => {
  const m = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',KeyA:'left',KeyD:'right',KeyW:'up',KeyS:'down'};
  const d = m[e.code];
  if (d) { e.preventDefault(); doMove(d); }
  if (e.code === 'KeyZ' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
});
let tx = null, ty = null;
document.getElementById('board').addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.getElementById('board').addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 25) { tx = null; return; }
  doMove(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  tx = null;
});
rand(); rand(); render();
</script>
</body>
</html>
