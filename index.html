<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="ui">
    <div id="score-container">
      <span id="score-label">Skóre</span>
      <span id="score">0</span>
    </div>
    <div id="left-btns">
      <button id="undo-btn" disabled>Zpět (0)</button>
      <button id="new-game-btn" hidden>Nová hra</button>
    </div>
  </div>
  <div id="board">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
  </div>
  <div id="win-overlay" hidden>
    <div id="win-box">
      <p id="win-title">Výhra!</p>
      <p id="win-message">Sestavila jsi všech 16 mocnin dvou.</p>
      <button id="win-close-btn">Zavřít</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
